<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בית הספר שלנו</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --gold:#C8920A;--gold-lt:#F5D060;--gold-pale:#FDF3D0;
  --navy:#1A2744;--navy-mid:#2C3E6B;
  --cream:#FBF7EE;--red:#C41230;--green:#1A7A4A;
  --border:rgba(200,146,10,0.22);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--cream);color:var(--navy);direction:rtl;min-height:100vh;}

.hdr{background:linear-gradient(135deg,#111e38 0%,var(--navy-mid) 55%,#1f3460 100%);padding:28px 24px;text-align:center;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='56' height='56' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M28 4 L52 18 L52 38 L28 52 L4 38 L4 18Z' fill='none' stroke='rgba(200,146,10,0.07)' stroke-width='1'/%3E%3C/svg%3E") repeat;}
.hdr-inner{position:relative;z-index:1;}
.bh{font-size:12px;color:var(--gold-lt);letter-spacing:1px;font-family:'Frank Ruhl Libre',serif;margin-bottom:8px;}
.hdr h1{font-family:'Frank Ruhl Libre',serif;font-size:32px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:6px;}
.hdr h1 em{color:var(--gold-lt);font-style:normal;}
.hdr-sub{font-size:13px;color:rgba(255,255,255,.5);}
.pasuk{background:rgba(200,146,10,0.13);border-top:1px solid rgba(200,146,10,0.28);padding:8px 24px;text-align:center;font-family:'Frank Ruhl Libre',serif;font-size:13px;color:var(--gold-lt);}

.main{max-width:800px;margin:0 auto;padding:28px 20px;}

.section-title{font-family:'Frank Ruhl Libre',serif;font-size:20px;font-weight:700;color:var(--navy);margin-bottom:16px;}

/* children grid */
.children-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.child-card{background:#fff;border-radius:16px;border:2px solid var(--border);padding:20px 14px;text-align:center;cursor:pointer;transition:all .18s;text-decoration:none;color:inherit;display:block;position:relative;}
.child-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(26,39,68,0.13);border-color:var(--gold);}
.child-avatar{font-size:48px;margin-bottom:8px;line-height:1;}
.child-name{font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.child-school{font-size:11px;color:#aaa;line-height:1.4;}
.child-badge{position:absolute;top:10px;left:10px;background:var(--green);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.child-color-bar{position:absolute;bottom:0;left:0;right:0;height:4px;border-radius:0 0 14px 14px;}

/* action buttons */
.action-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px;}
.action-btn{display:flex;align-items:center;gap:8px;padding:12px 20px;border-radius:12px;border:2px solid var(--border);background:#fff;color:var(--navy);font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;}
.action-btn:hover{border-color:var(--gold);background:var(--gold-pale);}
.action-btn.parent{background:var(--navy);color:#fff;border-color:var(--navy);}
.action-btn.parent:hover{background:var(--navy-mid);}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,39,68,.65);z-index:500;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.mbox{background:#fff;border-radius:18px;padding:26px;max-width:360px;width:90%;box-shadow:0 18px 55px rgba(0,0,0,.28);}
.mbox h3{font-family:'Frank Ruhl Libre',serif;font-size:19px;color:var(--navy);margin-bottom:14px;}
.mbox input{width:100%;border:2px solid var(--border);border-radius:10px;padding:11px 14px;font-size:15px;direction:rtl;font-family:'Heebo',sans-serif;margin-bottom:10px;}
.mbox input:focus{outline:none;border-color:var(--gold);}
.merr{display:none;color:var(--red);font-size:12px;margin-bottom:10px;}
.mbtn-row{display:flex;gap:8px;}
.mbtn{flex:1;padding:10px;border-radius:10px;border:none;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .18s;}
.mbtn.primary{background:var(--navy);color:#fff;}
.mbtn.primary:hover{background:var(--gold);}
.mbtn.ghost{background:transparent;color:#aaa;border:1.5px solid #ddd;}
.mbtn.ghost:hover{border-color:var(--red);color:var(--red);}

.empty-state{text-align:center;padding:40px 20px;color:#bbb;}
.empty-state div:first-child{font-size:44px;margin-bottom:10px;}
.empty-state p{font-size:14px;line-height:1.7;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div class="bh">בס"ד</div>
    <h1>בית הספר <em>שלנו</em></h1>
    <div class="hdr-sub" id="hdr-date"></div>
  </div>
  <div class="pasuk">❝ וְלִמַּדְתֶּם אֹתָם אֶת בְּנֵיכֶם לְדַבֵּר בָּם ❞</div>
</div>

<div class="main">
  <div class="section-title">👨‍👩‍👧‍👦 הילדים שלנו</div>
  <div class="children-grid" id="children-grid">
    <div class="empty-state" style="grid-column:1/-1;">
      <div>🏫</div>
      <p>אין עדיין ילדים רשומים.<br>הוסף ילדים דרך דשבורד ההורים.</p>
    </div>
  </div>

  <div class="action-row">
    <a href="board.html" class="action-btn">📋 לוח המשפחה</a>
    <button class="action-btn parent" onclick="openParentModal()">🔒 כניסת הורים</button>
  </div>
</div>

<!-- Parent auth modal -->
<div class="modal-bg" id="parent-modal">
  <div class="mbox">
    <h3>🔒 כניסת הורים</h3>
    <input type="password" id="parent-pw" placeholder="סיסמת הורים..." onkeydown="if(event.key==='Enter')checkParent()">
    <div class="merr" id="parent-err">❌ סיסמה שגויה</div>
    <div class="mbtn-row">
      <button class="mbtn ghost" onclick="closeParentModal()">ביטול</button>
      <button class="mbtn primary" onclick="checkParent()">כניסה ←</button>
    </div>
  </div>
</div>

<script>
// ── SUPABASE SYNC ──
const _SB_URL='https://ubwjsshbyglmfnjndmyt.supabase.co';
const _SB_KEY='sb_publishable_XmO4XsnEfX4c_g_kcQQcPQ_reGqNzOr';
const _FAM_ID='00000000-0000-0000-0000-000000000001';
let _SB=null;
function _initSB(){if(typeof createClient!=='undefined')_SB=createClient(_SB_URL,_SB_KEY);}
async function _sbGet(key){
  if(!_SB)return null;
  try{const{data}=await _SB.from('kv_store').select('value').eq('parent_id',_FAM_ID).eq('child_id','__family__').eq('key',key).single();return data?data.value:null;}
  catch(e){return null;}
}
function _sbSet(key,value){
  if(!_SB)return;
  _SB.from('kv_store').upsert({parent_id:_FAM_ID,child_id:'__family__',key,value,updated_at:new Date().toISOString()}).then(()=>{}).catch(()=>{});
}

// ── DATE ──
const DN=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const now=new Date();
document.getElementById('hdr-date').textContent='יום '+DN[now.getDay()]+' · '+now.toLocaleDateString('he-IL',{year:'numeric',month:'long',day:'numeric'});

// ── PROFILES ──
function getProfiles(){return JSON.parse(localStorage.getItem('family_profiles')||'[]');}

function checkSession(userId){
  const s=JSON.parse(localStorage.getItem('session_'+userId)||'null');
  return s&&new Date(s.expires)>new Date();
}

function renderChildren(){
  const profiles=getProfiles();
  const grid=document.getElementById('children-grid');
  if(!profiles.length){
    grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;"><div>🏫</div><p>אין עדיין ילדים רשומים.<br>הוסף ילדים דרך דשבורד ההורים.</p></div>';
    return;
  }
  grid.innerHTML=profiles.map(p=>{
    const hasSession=checkSession(p.id);
    const color=p.color||'#C8920A';
    return`<a href="app.html?u=${p.id}" class="child-card">
      ${hasSession?'<div class="child-badge">🟢 פעיל</div>':''}
      <div class="child-avatar">${p.photoData?`<img src="${p.photoData}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid ${p.color||'var(--gold)'};">`:p.avatarEmoji||'🧒'}</div>
      <div class="child-name">${p.name}</div>
      <div class="child-school">${p.school||''}<br>${p.className||''}</div>
      <div class="child-color-bar" style="background:${color};"></div>
    </a>`;
  }).join('');
}
async function init(){
  _initSB();
  const[profs,auth]=await Promise.all([_sbGet('family_profiles'),_sbGet('parent_auth')]);
  if(profs){localStorage.setItem('family_profiles',JSON.stringify(profs));}
  else{const lp=JSON.parse(localStorage.getItem('family_profiles')||'[]');if(lp.length)_sbSet('family_profiles',lp);}
  if(auth){localStorage.setItem('parent_auth',JSON.stringify(auth));}
  else{const la=JSON.parse(localStorage.getItem('parent_auth')||'null');if(la&&la.passwordHash)_sbSet('parent_auth',la);}
  renderChildren();
}
init();

// ── PARENT AUTH ──
async function hashPassword(pw){
  const enc=new TextEncoder();
  const buf=await crypto.subtle.digest('SHA-256',enc.encode(pw+'family-salt-2026'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function openParentModal(){
  document.getElementById('parent-modal').classList.add('on');
  document.getElementById('parent-pw').value='';
  document.getElementById('parent-err').style.display='none';
  setTimeout(()=>document.getElementById('parent-pw').focus(),100);
}
function closeParentModal(){document.getElementById('parent-modal').classList.remove('on');}

async function checkParent(){
  const pw=document.getElementById('parent-pw').value;
  if(!pw)return;
  const auth=JSON.parse(localStorage.getItem('parent_auth')||'null');
  // First time setup: no password set yet → accept any and save
  if(!auth||!auth.passwordHash){
    const hash=await hashPassword(pw);
    localStorage.setItem('parent_auth',JSON.stringify({passwordHash:hash}));
    _sbSet('parent_auth',{passwordHash:hash});
    setParentSession();return;
  }
  const hashed=await hashPassword(pw);
  if(hashed===auth.passwordHash){setParentSession();}
  else{document.getElementById('parent-err').style.display='block';}
}
function setParentSession(){
  const expires=new Date(Date.now()+4*3600*1000).toISOString();
  localStorage.setItem('parent_session',JSON.stringify({expires}));
  location.href='parent.html';
}
</script>
</body>
</html>
